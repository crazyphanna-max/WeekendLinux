<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Student - Student Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
        }
        nav {
            background-color: #333;
            padding: 10px;
        }
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
        }
        nav ul li {
            margin-right: 20px;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }
        nav ul li a:hover {
            text-decoration: underline;
        }
        form {
            max-width: 400px;
            margin: 20px auto;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            background-color: #f44336;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #da190b;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="add_student.html">Add Student</a></li>
            <li><a href="view_students.html">View Students</a></li>
            <li><a href="update_student.html">Update Student</a></li>
            <li><a href="delete_student.html">Delete Student</a></li>
        </ul>
    </nav>
    <h1>Delete Student</h1>
    <form id="deleteStudentForm">
        <label for="studentId">Student ID:</label>
        <input type="number" id="studentId" required>
        
        <button type="submit">Delete Student</button>
    </form>
    <script>
        document.getElementById('deleteStudentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = parseInt(document.getElementById('studentId').value);
            let students = JSON.parse(localStorage.getItem('students')) || [];
            const index = students.findIndex(s => s.id === id);
            if (index !== -1) {
                students.splice(index, 1);
                localStorage.setItem('students', JSON.stringify(students));
                alert('Student deleted successfully!');
                document.getElementById('deleteStudentForm').reset();
            } else {
                alert('Student not found');
            }
        });
    </script>
</body>
</html>
